# For documentation-heavy repositories that want gentle disclosure guidance with minimal friction.
# Accepts AI-assistance disclosure trailers and prevents configured tools from being DCO signers.
# Does not require SPDX headers for documentation files or infer whether AI was used.
mode: advisory
require_ai_disclosure: false
accepted_trailers:
  - Assisted-by
  - Generated-by
forbid_ai_signed_off_by: true
require_human_dco: false
require_spdx_for_new_files: false
accepted_tools:
  - GitHub Copilot
  - ChatGPT
