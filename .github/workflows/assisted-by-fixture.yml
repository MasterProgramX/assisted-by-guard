name: Assisted-By Guard Fixture

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  root-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          policy-path: examples/advisory-policy.yml
          pr-json: examples/fixtures/pr.valid.json

  package-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./packages/github-action
        with:
          policy-path: examples/advisory-policy.yml
          pr-json: examples/fixtures/pr.valid.json
