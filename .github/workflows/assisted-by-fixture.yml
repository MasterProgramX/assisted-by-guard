name: Assisted-By Guard Fixture

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  local-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: MasterProgramX/assisted-by-guard@v0.1.0
        with:
          policy-path: examples/advisory-policy.yml
          pr-json: examples/fixtures/pr.valid.json
